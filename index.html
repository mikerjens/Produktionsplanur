<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>KRENKARIRNIR · Produktionsportal</title>
<style>
  :root{
    --bg:#0f1115;
    --card:#171922;
    --muted:#9aa3b2;
    --text:#e8ecf1;
    --brand:#7dd3fc;
    --brand2:#a78bfa;
    --border:#262a36;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:linear-gradient(180deg,#0d0f14 0%,#11141b 100%);
    color:var(--text);
    font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  }
  header{
    display:flex;
    align-items:center;
    gap:.75rem;
    padding:16px 20px;
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    background:#0f1115cc;
    backdrop-filter: blur(6px);
    z-index:10;
  }
  .logo{
    display:flex;
    align-items:center;
    gap:.5rem;
    cursor:pointer;
    text-decoration:none;
    color:var(--text);
  }
  .logo .mark{
    width:32px;
    height:32px;
    border-radius:10px;
    background:conic-gradient(from 210deg,var(--brand),var(--brand2));
  }
  .logo h1{
    font-size:18px;
    letter-spacing:.4px;
    margin:0;
    font-weight:700;
  }
  .wrap{
    display:grid;
    grid-template-columns:320px 1fr 360px;
    gap:16px;
    padding:16px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    box-shadow:0 6px 24px rgba(0,0,0,.25);
  }
  .pane{padding:16px}
  h2{margin:.25rem 0 1rem 0;font-size:18px}
  h3{margin:1rem 0 .5rem 0;font-size:16px}
  label{display:block;margin-bottom:.5rem;font-size:13px;color:var(--muted)}
  select,input[type="search"]{
    width:100%;
    padding:12px;
    border-radius:12px;
    background:#0f1218;
    border:1px solid var(--border);
    color:var(--text);
    outline:none;
  }
  .tag{
    font-size:12px;
    padding:2px 8px;
    border-radius:999px;
    border:1px solid var(--border);
    color:var(--muted);
  }
  .list{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-top:12px;
  }
  .item{
    padding:12px;
    border:1px solid var(--border);
    border-radius:12px;
    background:#131623;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
  }
  .item:hover{
    border-color:#2f3444;
    transform:translateY(-1px);
  }
  .muted{color:var(--muted)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .program{display:flex;flex-direction:column;gap:8px}
  .step{
    display:flex;
    gap:10px;
    align-items:flex-start;
    background:#121622;
    border:1px dashed #293042;
    padding:10px;
    border-radius:10px;
  }
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{
    padding:6px 10px;
    border-radius:999px;
    border:1px solid var(--border);
    background:#0f1218;
    font-size:12px;
  }
  .pill{
    padding:4px 10px;
    border-radius:999px;
    background:#0f1218;
    border:1px solid var(--border);
    font-size:12px;
  }
  .toolbar{display:flex;gap:8px;flex-wrap:wrap}
  button{
    cursor:pointer;
    border:1px solid var(--border);
    background:#10131a;
    color:var(--text);
    padding:10px 12px;
    border-radius:12px;
  }
  button.primary{
    border-color:transparent;
    background:linear-gradient(135deg,var(--brand),var(--brand2));
  }
  .section{
    border-top:1px solid var(--border);
    margin-top:12px;
    padding-top:12px;
  }
  .empty{padding:16px;text-align:center;color:var(--muted)}
  .kicker{
    font-size:12px;
    color:var(--muted);
    letter-spacing:.3px;
    text-transform:uppercase;
  }
  .stack{display:flex;flex-direction:column;gap:10px}
  .two{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}
  .daybtn{width:100%;text-align:left}
  .contact-row{
    display:flex;
    justify-content:space-between;
    gap:8px;
    padding:10px;
    border:1px solid var(--border);
    border-radius:10px;
    background:#101421;
  }
  .scroll{max-height:62vh;overflow:auto;padding-right:6px}
  .search{display:flex;gap:8px;margin-top:8px}
  .footer{
    padding:10px 16px;
    color:var(--muted);
    font-size:12px;
    text-align:center;
  }
  a{color:#a5b4fc}

  /* Status / progress */
  .status-block{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .progressbar{
    width:100%;
    height:8px;
    border-radius:999px;
    background:#0c0f16;
    border:1px solid #222637;
    overflow:hidden;
  }
  .progressfill{
    height:100%;
    width:0;
    border-radius:999px;
    background:linear-gradient(90deg,var(--brand),var(--brand2));
    transition:width .8s ease-out;
  }
  .statusline{
    font-size:13px;
    color:var(--muted);
  }

  @media (max-width:1100px){
    .wrap{grid-template-columns:1fr;}
    .right{order:3}
    .center{order:2}
    .left{order:1}
  }

  /* Modal */
  .modal{
    display:none;
    position:fixed;
    inset:0;
    background:#0009;
    z-index:50;
    align-items:center;
    justify-content:center;
  }
  .modal .box{
    width:min(1000px,94vw);
    max-height:86vh;
    overflow:auto;
  }
  .modal .hdr{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    position:sticky;
    top:0;
    background:var(--card);
    padding-bottom:8px;
    margin-bottom:8px;
  }

  /* Print */
  @media print{
    body{background:white;color:black}
    header,.left,.right,.footer,#contactsModal{display:none !important}
    .center{border:none;box-shadow:none}
  }
</style>
</head>
<body>
<header>
  <a class="logo" onclick="resetUI()" title="Til start">
    <span class="mark"></span><h1>KRENKARIRNIR · Produktionsportal</h1>
  </a>
</header>

<div class="wrap">
  <!-- VENSTRE -->
  <div class="card pane left">
    <div class="toolbar">
      <button class="primary" onclick="openContacts()">Kontakter</button>
      <button onclick="window.print()">Print</button>
    </div>

    <!-- STATUS / PROGRESS -->
    <div class="section">
      <div class="kicker">Status</div>
      <div class="status-block">
        <div id="statusLine" class="statusline">Indlæser status…</div>
        <div class="progressbar">
          <div id="statusFill" class="progressfill"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <label for="nameSelect">Vælg dit navn</label>
      <select id="nameSelect" onchange="renderMySchedule()">
        <option value="">— Vælg person —</option>
      </select>
    </div>
    <div class="section">
      <div class="kicker">Mit skema</div>
      <div id="mySchedule" class="stack"></div>
    </div>
  </div>

  <!-- MIDTEN -->
  <div class="card pane center">
    <div class="two">
      <div>
        <div class="kicker">Valgt dag</div>
        <h2 id="dayTitle">Vælg en dag i højre side</h2>
        <div id="dayMeta" class="chips"></div>
        <div class="section">
          <h3>Program</h3>
          <div id="program" class="program"></div>
        </div>
        <div class="section grid">
          <div>
            <h3>Skuespillere</h3>
            <div id="cast" class="chips"></div>
          </div>
          <div>
            <h3>Crew</h3>
            <div id="crew" class="chips"></div>
          </div>
        </div>
      </div>
      <div>
        <h3>Call sheet</h3>
        <div id="callInfo" class="stack">
          <div class="muted">Ingen fil knyttet.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- HØJRE -->
  <div class="card pane right">
    <div class="kicker">Produktionsdage</div>
    <div class="search">
      <input id="daySearch" type="search" placeholder="Søg dato, sted, titel…" oninput="renderDayList()">
    </div>
    <div id="dayList" class="list scroll"></div>
  </div>
</div>

<!-- Kontakter modal -->
<div id="contactsModal" class="modal">
  <div class="card pane box">
    <div class="hdr">
      <h2 style="margin:0">Kontakter</h2>
      <div class="toolbar"><button onclick="closeContacts()">Luk</button></div>
    </div>
    <div class="search">
      <input id="contactSearch" type="search" placeholder="Søg navn, rolle, e-mail, tlf…" oninput="renderContacts()">
    </div>
    <div id="contactsList" class="stack section"></div>
  </div>
</div>

<div class="footer">Version: 24.09.2025 · Kilde: Produktionsplan v3.4 (arbejdsversion)</div>

<script>
/* -------------------- PRODUKTIONS-TIMER / STATUS -------------------- */
/* Estimat baseret på hele planen:
   Ca. 108 produktionstimer totalt og ca. 5,5 timer tilbage på sidste optagedag.
   Juster værdierne her, hvis du senere finregner timerne. */
const TOTAL_HOURS = 108;
const REMAINING_HOURS = 5.5;

/* -------------------- DATA (SISTE OPTAGEDAG) -------------------- */

const DAYS = [
  {
    id: "2025-12-14",
    title: 'Søndag 14. dec. · “Flashback 3B – kaffemaskine scene”',
    location: 'Tjarnir (Presselogen)',
    program: [
      ["15:00","Film crew gør “kaffemaskine scenen” i Presselogen klar (Hans Petur, Thomas, Michael)"],
      ["15:00","Lydmand, make-up og stylist møder (Ronni Poulsen, Julia Jacobsen)"],
      ["15:00","2 statister (girl 1 og girl 2) og 1 hovedskuespiller møder til make-up/tøj (Helena, ukendt kvindelig statist, Hjálmar Dam)"],
      ["17:00","Optagelse starter"],
      ["20:30","SLUT"]
    ],
    cast: ["Helena","Ukendt kvindelig statist","Hjálmar Dam"],
    crew: ["Michael Koba","Thomas Koba","Hans Petur Hansen","Ronni Poulsen","Julia Jacobsen"],
    call: null
  }
];

/* Kun personer som stadig skal med fremover */
const CONTACTS = {
  "Helena": {
    role:"Statist · Flashback girl 1",
    email:"helena.h.jorgensen@gmail.com",
    phone:"274450"
  },
  "Ukendt kvindelig statist": {
    role:"Statist · Flashback girl 2"
  },
  "Hjálmar Dam": {
    role:"Skuespiller · Høgni Nielsen",
    email:"helmetsdam@gmail.com",
    phone:"512449"
  },
  "Michael Koba": {
    role:"Producer",
    email:"mk@fixer.fo",
    phone:"591011"
  },
  "Thomas Koba": {
    role:"Instruktør",
    email:"thomas@kovboyfilm.com",
    phone:"213457"
  },
  "Hans Petur Hansen": {
    role:"Lys",
    email:"hph@kvf.fo",
    phone:"296652"
  },
  "Ronni Poulsen": {
    role:"Lyd",
    email:"ronni.poulsen@gmail.com",
    phone:"794141"
  },
  "Julia Jacobsen": {
    role:"Make-up",
    email:"juliajacobsen@outlook.com",
    phone:"251175"
  }
};

/* Udledte navne til dropdown */
const PEOPLE = Array.from(new Set([
  ...Object.keys(CONTACTS),
  ...DAYS.flatMap(d => [...d.cast, ...d.crew])
])).sort((a,b)=>a.localeCompare(b,'da'));

/* -------------------- DOM helpers -------------------- */
const el = id => document.getElementById(id);
let currentDay = null;

/* -------------------- INIT -------------------- */
function init(){
  // Fyld navneliste
  const sel = el('nameSelect');
  PEOPLE.forEach(p=>{
    const o = document.createElement('option');
    o.value = p;
    o.textContent = p;
    sel.appendChild(o);
  });

  renderDayList();
  renderStatus();
}

function renderStatus(){
  const total = TOTAL_HOURS;
  const remaining = REMAINING_HOURS;
  const done = Math.max(0, total - remaining);
  const pctDone = Math.round(done / total * 100);
  const pctLeft = 100 - pctDone;

  const statusLine = el('statusLine');
  const statusFill = el('statusFill');

  statusLine.textContent =
    `Ca. ${pctDone}% af optagetimerne er gennemført · ${pctLeft}% tilbage`;
  statusFill.style.width = pctDone + '%';
}

init();

/* -------------------- UI base -------------------- */
function resetUI(){
  el('nameSelect').value = "";
  renderMySchedule();
  currentDay = null;
  el('dayTitle').textContent = 'Vælg en dag i højre side';
  el('dayMeta').innerHTML = '';
  el('program').innerHTML = '';
  el('cast').innerHTML = '';
  el('crew').innerHTML = '';
  el('callInfo').innerHTML = '<div class="muted">Ingen fil knyttet.</div>';
  renderDayList();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* -------------------- Dagsliste (højre) -------------------- */
function renderDayList(){
  const q = (el('daySearch').value || '').toLowerCase();
  const list = el('dayList');
  list.innerHTML = '';

  const days = [...DAYS].sort((a,b)=>a.id.localeCompare(b.id)); // dato-sorteret
  days.forEach(d=>{
    if(q && !(d.title.toLowerCase().includes(q) || d.location.toLowerCase().includes(q))) return;
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <div>
        <div><strong>${d.title}</strong></div>
        <div class="muted">${d.location}</div>
      </div>
      <span class="tag">Se program</span>`;
    div.onclick = ()=>showDay(d.id);
    list.appendChild(div);
  });

  if(!list.children.length){
    list.innerHTML = '<div class="empty">Ingen produktionsdage matcher din søgning.</div>';
  }
}

function showDay(dayId){
  const d = DAYS.find(x=>x.id===dayId);
  if(!d) return;
  currentDay = d.id;

  el('dayTitle').textContent = d.title;
  el('dayMeta').innerHTML = `
    <span class="pill">Location: ${d.location}</span>
    <span class="pill">Skuespillere: ${d.cast.length}</span>
    <span class="pill">Crew: ${d.crew.length}</span>
  `;

  const prog = el('program');
  prog.innerHTML = '';
  if(!d.program || !d.program.length){
    prog.innerHTML = '<div class="empty">Intet program registreret.</div>';
  } else {
    d.program.forEach(([t,desc])=>{
      const row = document.createElement('div');
      row.className = 'step';
      row.innerHTML = `<time class="tag">${t}</time><div>${desc}</div>`;
      prog.appendChild(row);
    });
  }

  el('cast').innerHTML = d.cast.length
    ? d.cast.map(n => `<span class="chip" title="${contactTip(n)}">${n}</span>`).join('')
    : '<div class="muted">–</div>';

  el('crew').innerHTML = d.crew.length
    ? d.crew.map(n => `<span class="chip" title="${contactTip(n)}">${n}</span>`).join('')
    : '<div class="muted">–</div>';

  el('callInfo').innerHTML = d.call
    ? `<a href="${d.call}" target="_blank">Åbn call sheet (PDF)</a>`
    : '<div class="muted">Ingen fil knyttet.</div>';

  if(window.innerWidth < 1100){
    document.querySelector('.center').scrollIntoView({behavior:'smooth'});
  }
}

/* -------------------- Mit skema -------------------- */
function renderMySchedule(){
  const name = el('nameSelect').value;
  const box = el('mySchedule');
  box.innerHTML = '';

  if(!name){
    box.innerHTML = '<div class="empty">Vælg dit navn for at se dine arbejdsdage.</div>';
    return;
  }

  const mine = [...DAYS]
    .sort((a,b)=>a.id.localeCompare(b.id))
    .filter(d => d.cast.includes(name) || d.crew.includes(name));

  if(!mine.length){
    box.innerHTML = '<div class="empty">Ingen dage fundet for denne person.</div>';
    return;
  }

  mine.forEach(d=>{
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <div>
        <div><strong>${d.title}</strong></div>
        <div class="muted">${d.location}</div>
      </div>
      <button class="daybtn">Åbn</button>`;
    div.onclick = ()=>showDay(d.id);
    box.appendChild(div);
  });
}

/* -------------------- Kontakter -------------------- */
function contactTip(name){
  const c = CONTACTS[name];
  if(!c) return '';
  const bits = [c.role, c.email, c.phone].filter(Boolean);
  return bits.join(' · ');
}

function openContacts(){
  el('contactsModal').style.display = 'flex';
  renderContacts();
}
function closeContacts(){
  el('contactsModal').style.display = 'none';
}
function renderContacts(){
  const q = (el('contactSearch').value || '').toLowerCase();
  const root = el('contactsList');
  root.innerHTML = '';

  const rows = Object.entries(CONTACTS)
    .filter(([name,c])=>{
      const hay = [name,c.role||'',c.email||'',c.phone||''].join(' ').toLowerCase();
      return !q || hay.includes(q);
    })
    .sort((a,b)=>a[0].localeCompare(b[0],'da'));

  if(!rows.length){
    root.innerHTML = '<div class="empty">Ingen kontakter matcher.</div>';
    return;
  }

  rows.forEach(([name,c])=>{
    const div = document.createElement('div');
    div.className = 'contact-row';
    const role = c.role ? `<div class="muted">${c.role}</div>` : '';
    const mail = c.email ? `<a href="mailto:${c.email}">${c.email}</a>` : '<span class="muted">—</span>';
    const tel  = c.phone ? `<a href="tel:${c.phone}">${c.phone}</a>`   : '<span class="muted">—</span>';
    div.innerHTML = `
      <div>
        <div><strong>${name}</strong></div>
        ${role}
      </div>
      <div style="text-align:right">
        <div>${mail}</div>
        <div>${tel}</div>
      </div>`;
    root.appendChild(div);
  });
}
</script>
</body>
</html>
