<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Call Sheet Portal</title>

  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:#0b1220;
      color:#eaf1ff;
    }
    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:24px;
    }
    h1{margin:0 0 8px}
    p{color:#9fb0d0;margin:0 0 20px}

    select{
      padding:10px 12px;
      font-size:16px;
      border-radius:8px;
      border:1px solid #333;
      background:#111a2e;
      color:#fff;
      margin-bottom:20px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }
    @media(max-width:900px){
      .grid{grid-template-columns:1fr}
    }

    .card{
      background:#111a2e;
      border-radius:14px;
      padding:16px;
      border:1px solid rgba(255,255,255,0.08);
    }

    .pill{
      background:#0b1220;
      padding:10px;
      border-radius:10px;
      margin-bottom:8px;
      font-size:14px;
    }

    .item{
      background:#0b1220;
      padding:12px;
      border-radius:12px;
      margin-bottom:10px;
      border:1px solid rgba(255,255,255,0.06);
    }

    .time{
      font-weight:700;
      margin-bottom:4px;
    }

    .muted{color:#9fb0d0;font-size:13px}
  </style>
</head>

<body>
<div class="wrap">

  <h1>Call Sheet Portal</h1>
  <p>Vælg dit navn – se kun dit eget skema</p>

  <select id="personSelect"></select>

  <div class="grid">
    <div class="card">
      <h2>Mit skema</h2>
      <div id="myMeta"></div>
      <div id="myList"></div>
    </div>

    <div class="card">
      <h2>Dagsoversigt</h2>
      <div id="dayList"></div>
    </div>
  </div>

</div>

<script>
/* ---------------- DATA ---------------- */

const DATA = {
  day: {
    date: "Torsdag 8. januar 2025",
    location: "Tórgarðsgøta 15",
    wrap: "20:00"
  },

  people: [
    { id:"michael", name:"Michael Koba", role:"Producer" },
    { id:"thomas", name:"Thomas Koba", role:"Fotograf" },
    { id:"hans", name:"Hans Petur Hansen", role:"Lys / Foto" },
    { id:"gitte", name:"Gitte Klein", role:"Skuespiller" },
    { id:"suni", name:"Suni Poulsen", role:"Skuespiller" }
  ],

  schedule: [
    { time:"10:00", title:"Afhent udstyr", where:"Elding", who:["michael","thomas"] },
    { time:"11:00", title:"Afhent filmvogn", where:"Hjalla", who:["thomas","hans"] },
    { time:"12:00", title:"Klargøring af location", where:"Tórgarðsgøta 15", who:["michael","thomas","hans"] },
    { time:"13:00", title:"Make-up", where:"Stjørnuskotið", who:["gitte"] },
    { time:"13:30", title:"Make-up", where:"Stjørnuskotið", who:["suni"] },
    { time:"16:00", title:"Optagelse", where:"Tórgarðsgøta 15", who:["michael","thomas","hans","gitte","suni"] },
    { time:"20:00", title:"Wrap", where:"Tórgarðsgøta 15", who:["michael","thomas","hans"] }
  ]
};

/* ---------------- LOGIK ---------------- */

const personSelect = document.getElementById("personSelect");
const myMeta = document.getElementById("myMeta");
const myList = document.getElementById("myList");
const dayList = document.getElementById("dayList");

// dropdown
DATA.people.forEach(p=>{
  const opt = document.createElement("option");
  opt.value = p.id;
  opt.textContent = p.name + " – " + p.role;
  personSelect.appendChild(opt);
});

// render dagsoversigt
function renderDay(){
  dayList.innerHTML = "";
  DATA.schedule.forEach(s=>{
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="time">${s.time} – ${s.title}</div>
      <div class="muted">📍 ${s.where}</div>
      <div class="muted">👥 ${s.who.map(id => DATA.people.find(p=>p.id===id).name).join(", ")}</div>
    `;
    dayList.appendChild(div);
  });
}

// render person
function renderPerson(id){
  const person = DATA.people.find(p=>p.id===id);
  myMeta.innerHTML = `
    <div class="pill"><b>${person.name}</b><br>${person.role}</div>
    <div class="pill">${DATA.day.date}<br>📍 ${DATA.day.location}<br>Wrap: ${DATA.day.wrap}</div>
  `;

  myList.innerHTML = "";
  DATA.schedule.filter(s=>s.who.includes(id)).forEach(s=>{
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="time">${s.time} – ${s.title}</div>
      <div class="muted">📍 ${s.where}</div>
    `;
    myList.appendChild(div);
  });
}

// events
personSelect.addEventListener("change", e=>{
  renderPerson(e.target.value);
});

// init
renderDay();
renderPerson(DATA.people[0].id);
</script>

</body>
</html>
