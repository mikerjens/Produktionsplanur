<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Call Sheet Portal</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#111a2e;
      --muted:#9fb0d0;
      --text:#eaf1ff;
      --line:rgba(255,255,255,.08);
      --good:#49d17e;
      --warn:#ffcc66;
      --bad:#ff6b6b;
      --accent:#6aa8ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(1200px 600px at 20% 0%, rgba(106,168,255,.18), transparent 60%),
                  radial-gradient(900px 500px at 80% 10%, rgba(73,209,126,.12), transparent 55%),
                  var(--bg);
      color:var(--text);
      line-height:1.35;
    }
    .wrap{max-width:1100px;margin:0 auto;padding:22px}
    .top{
      display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;justify-content:space-between;
      margin-bottom:16px;
    }
    .title h1{margin:0;font-size:22px;letter-spacing:.2px}
    .title p{margin:6px 0 0;color:var(--muted);font-size:14px}
    .controls{
      display:flex;gap:10px;align-items:center;flex-wrap:wrap;
      background:rgba(17,26,46,.55);
      border:1px solid var(--line);
      padding:12px;border-radius:14px;
      backdrop-filter: blur(10px);
    }
    select, button, input{
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      font-size:14px;
      outline:none;
    }
    select{min-width:240px}
    button{cursor:pointer}
    button:hover{border-color:rgba(255,255,255,.18)}
    .grid{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:14px;
    }
    @media (max-width: 920px){ .grid{grid-template-columns:1fr} select{min-width: 220px} }
    .card{
      background:rgba(17,26,46,.7);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      box-shadow: 0 14px 40px rgba(0,0,0,.28);
      backdrop-filter: blur(10px);
    }
    .card h2{margin:0 0 10px;font-size:16px}
    .meta{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-top:10px;
    }
    .pill{
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 12px;
      background:rgba(255,255,255,.04);
      font-size:13px;
    }
    .pill b{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px}
    .list{
      display:flex;flex-direction:column;gap:10px;margin-top:10px;
    }
    .item{
      display:flex;gap:12px;align-items:flex-start;justify-content:space-between;
      padding:12px;
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(255,255,255,.04);
    }
    .left{min-width:0}
    .time{
      display:inline-flex;align-items:center;gap:8px;
      font-weight:700;
      padding:6px 10px;border-radius:999px;
      background:rgba(106,168,255,.14);
      border:1px solid rgba(106,168,255,.25);
      margin-bottom:6px;
      font-size:13px;
    }
    .desc{color:var(--text);font-size:14px}
    .sub{color:var(--muted);font-size:13px;margin-top:2px}
    .tag{
      font-size:12px;color:var(--muted);
      border:1px solid var(--line);
      padding:6px 10px;border-radius:999px;
      white-space:nowrap;
    }
    .notice{
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
      border-top:1px dashed var(--line);
      padding-top:10px;
    }
    .ok{color:var(--good)}
    .warn{color:var(--warn)}
    .bad{color:var(--bad)}
    .small{font-size:12px;color:var(--muted)}
    .footer{margin-top:14px;color:var(--muted);font-size:12px}
    .copybox{
      display:flex;gap:10px;align-items:center;flex-wrap:wrap;
      margin-top:10px;
    }
    .copybox input{min-width:240px}
  </style>
</head>

  <div class="wrap">
    <div class="top">
      <div class="title">
        <h1>Call Sheet Portal</h1>
        <p>Vælg dit navn → se din mødetid, dine opgaver og hvor du skal være.</p>
      </div>

      <div class="controls">
        <label class="small" for="personSelect">Jeg er:</label>
        <select id="personSelect"></select>
        <button id="showAllBtn" title="Vis hele dagsoversigten">Vis dagsoversigt</button>
      </div>
    </div>

    <div class="grid">
      <div class="card" id="myCard">
        <h2>Mit skema</h2>
        <div id="myMeta" class="meta"></div>
        <div id="myList" class="list"></div>

        <div class="copybox">
          <input id="shareLink" type="text" readonly />
          <button id="copyBtn">Kopiér link</button>
          <span class="small">Tip: Send linket til folk – navnet kan være med i URL’en.</span>
        </div>

        <div class="notice" id="myNotice"></div>
      </div>

      <div class="card" id="dayCard">
        <h2>Dagsoversigt</h2>
        <div id="dayMeta" class="meta"></div>
        <div id="dayList" class="list"></div>
        <div class="footer">Hvis du vil skjule dagsoversigten for alle, kan du fjerne højre kolonne i HTML’en.</div>
      </div>
    </div>
  </div>
